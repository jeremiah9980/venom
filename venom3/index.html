<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Venom — UI Model 3 Preview</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#07050a}
    iframe{display:block;width:100%;height:100%;border:0;background:#07050a}
    .model-tag{position:fixed;right:14px;bottom:14px;z-index:10;background:rgba(7,5,10,.90);color:#fde047;border:1px solid rgba(139,92,246,.55);box-shadow:0 0 28px rgba(139,92,246,.25);backdrop-filter:blur(10px);padding:8px 12px;border-radius:999px;font:700 11px/1.1 Arial,sans-serif;letter-spacing:1.5px;text-transform:uppercase;pointer-events:none}
  </style>
</head>
<body>
  <iframe id="site" src="../index.html" title="Texas Venom UI Model 3"></iframe>
  <div class="model-tag">UI Model 3 · Neon Night</div>
  <script>
    const frame = document.getElementById('site');
    const themeUrl = 'https://raw.githubusercontent.com/jeremiah9980/venom/venom3/assets/css/team-venom.css';
    let themeCss = '';

    async function loadTheme(){
      try{
        const response = await fetch(themeUrl, {cache:'no-store'});
        themeCss = await response.text();
        applyTheme();
      }catch(error){
        console.error('Unable to load UI Model 3 theme', error);
      }
    }

    function applyTheme(){
      if(!themeCss) return;
      try{
        const doc = frame.contentDocument;
        if(!doc || !doc.head) return;
        const old = doc.getElementById('venom-model-theme');
        if(old) old.remove();
        const style = doc.createElement('style');
        style.id = 'venom-model-theme';
        style.textContent = themeCss;
        doc.head.appendChild(style);
        document.title = (doc.title || 'Texas Venom') + ' — UI Model 3';
      }catch(error){
        console.error('Unable to apply UI Model 3 theme', error);
      }
    }

    frame.addEventListener('load', applyTheme);
    loadTheme();
  </script>
</body>
</html>
