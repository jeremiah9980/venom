<body>
  <iframe id="site" src="../index.html" title="Texas Venom UI 4"></iframe>
  <div class="tag">UI 4 · Strike Lab</div>
  <script>const f=document.getElementById('site'),urls=['https://raw.githubusercontent.com/jeremiah9980/venom/venom4/assets/css/team-venom.css','https://raw.githubusercontent.com/jeremiah9980/venom/venom4/assets/css/theme-modes.css'];let css=[];async function load(){try{css=await Promise.all(urls.map(async u=>await(await fetch(u,{cache:'no-store'})).text()));apply()}catch(e){console.error(e)}}function apply(){if(css.length<2)return;try{const d=f.contentDocument;if(!d||!d.head)return;['venom-preview-theme','venom-preview-modes'].forEach(id=>d.getElementById(id)?.remove());css.forEach((c,i)=>{const s=d.createElement('style');s.id=i?'venom-preview-modes':'venom-preview-theme';s.textContent=c;d.head.appendChild(s)})}catch(e){console.error(e)}}f.addEventListener('load',apply);load();</script>
