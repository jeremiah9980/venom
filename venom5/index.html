<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Texas Venom UI 5 — Varsity Luxe</title><style>html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#241c2b}iframe{width:100%;height:100%;border:0;display:block;background:#fff}.tag{position:fixed;right:14px;bottom:14px;z-index:10;background:#fff;color:#44206f;border:1px solid #bfa8d4;padding:8px 12px;border-radius:999px;font:700 11px Arial;letter-spacing:1.4px;text-transform:uppercase;pointer-events:none;box-shadow:0 10px 28px rgba(61,34,82,.15)}</style></head><body><iframe id="site" src="../index.html" title="Texas Venom UI 5"></iframe><div class="tag">UI 5 · Varsity Luxe</div><script>const f=document.getElementById('site'),urls=['https://raw.githubusercontent.com/jeremiah9980/venom/ui-venom-5/assets/css/team-venom.css','https://raw.githubusercontent.com/jeremiah9980/venom/ui-venom-5/assets/css/theme-modes.css'];let css=[];async function load(){try{css=await Promise.all(urls.map(async u=>await(await fetch(u,{cache:'no-store'})).text()));apply()}catch(e){console.error(e)}}function apply(){if(css.length<2)return;try{const d=f.contentDocument;if(!d||!d.head)return;['venom-preview-theme','venom-preview-modes'].forEach(id=>d.getElementById(id)?.remove());css.forEach((c,i)=>{const s=d.createElement('style');s.id=i?'venom-preview-modes':'venom-preview-theme';s.textContent=c;d.head.appendChild(s)})}catch(e){console.error(e)}}f.addEventListener('load',apply);load();</script></body></html>
