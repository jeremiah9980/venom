name: Update NCS Tournaments

on:
  workflow_dispatch:
  schedule:
    - cron: "15 11 * * *"

permissions:
  contents: write

jobs:
  update-ncs-tournaments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install requests beautifulsoup4

      - name: Pull NCS tournament data
        run: python refine-ncs-tournament.py --config ncs-teams.json --out data --js public/js/ncs-tournaments.js

      - name: Commit updated NCS data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ncs-tournaments*.json public/js/ncs-tournaments.js
          if git diff --cached --quiet; then
            echo "No NCS tournament changes detected."
          else
            git commit -m "Update NCS tournament data"
            git push
          fi
