name: Sync NCS Tournament Dashboard

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/sync-ncs-tournament.py"
      - "scripts/refine-ncs-tournament.py"
      - ".github/workflows/sync-ncs-tournament.yml"

permissions:
  contents: write

concurrency:
  group: ncs-tournament-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: pip install requests beautifulsoup4

      - name: Sync NCS schedule, scores, and bracket
        run: |
          python3 scripts/sync-ncs-tournament.py
          python3 scripts/refine-ncs-tournament.py

      - name: Commit dashboard data when changed
        run: |
          git config user.name "venom-tournament-bot"
          git config user.email "venom-tournament-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain assets/data/ncs-tournament.json)" ]; then
            git add assets/data/ncs-tournament.json
            git commit -m "chore(tournament): sync NCS scores [$(date -u +%FT%TZ)]"
            git pull --rebase origin main || true
            git push
          else
            echo "No NCS tournament changes"
          fi
